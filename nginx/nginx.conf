worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    gzip       on;
    gzip_types text/plain application/json;

    # WHY rate limiting here, at the proxy, instead of in the app:
    # This protects the backend from being overwhelmed regardless of which
    # replica handles a request — one shared limit in front, rather than
    # each app instance separately trying to defend itself.
    # 10r/s per client IP, with a burst allowance of 20 requests handled
    # immediately (not queued/delayed — "nodelay") before rejecting further.
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # ============================================================
    # UPSTREAM — the load-balanced backend pool
    # ============================================================
    # WHY two servers listed EXPLICITLY, instead of relying on Docker's
    # internal DNS to round-robin a single service name: nginx resolves
    # upstream hostnames ONCE at startup and caches the result — it does
    # NOT automatically discover new replicas the way Docker's embedded DNS
    # does for other tools. Listing servers explicitly is also clearer for
    # learning: you can see exactly which two backends are in the pool,
    # rather than trusting DNS magic you can't directly observe.
    #
    # Default load balancing method here is nginx's default: round-robin
    # (each request alternates between app1 and app2). Other methods exist
    # (least_conn, ip_hash) — round-robin is the right default when
    # backends are stateless, which is true here (no in-memory session
    # state — auth/session data, if this app had any, would need to live in
    # the DB or a shared cache like Redis, not in-process).
    upstream backend {
        server app1:8000;
        server app2:8000;
    }

    # Redirect all plain HTTP to HTTPS — nothing should be served unencrypted
    server {
        listen 80;
        server_name localhost;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate     /etc/nginx/certs/localhost.crt;
        ssl_certificate_key /etc/nginx/certs/localhost.key;

        # Modern-ish baseline — fine for local learning. A real deployment
        # would pull these from current Mozilla SSL config generator
        # recommendations rather than hand-picking them.
        ssl_protocols       TLSv1.2 TLSv1.3;

        limit_req zone=api_limit burst=20 nodelay;

        location / {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Excluded from rate limiting and access logs — health checks fire
        # frequently and aren't the traffic the rate limit is meant to
        # protect against.
        location /health/ {
            access_log off;
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }
    }
}
