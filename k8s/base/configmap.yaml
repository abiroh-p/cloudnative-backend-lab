apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-app-config
  namespace: default
data:
  # WHY no POSTGRES_PASSWORD here — that's the actual payoff of Stages 2c
  # and this one: the app fetches it from Key Vault at runtime via
  # Workload Identity. This ConfigMap only holds values that are NOT
  # secret — hostname, username, non-sensitive settings. This is exactly
  # the "only genuinely sensitive values go in Key Vault, everything else
  # stays as plain config" principle from ADR 0005/0006, now actually
  # running for real instead of via a local .env + az-login workaround.
  POSTGRES_HOST: "${POSTGRES_HOST}"
  POSTGRES_USER: "${POSTGRES_USER}"
  POSTGRES_DB: "${POSTGRES_DB}"
  POSTGRES_PORT: "5432"
  POSTGRES_SSLMODE: "require"
  KEY_VAULT_URI: "${KEY_VAULT_URI}"
  ENVIRONMENT: "aks"
  LOG_LEVEL: "INFO"
