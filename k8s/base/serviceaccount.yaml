apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-app
  namespace: default
  annotations:
    # WHY this exact annotation: this is the piece that ties this
    # ServiceAccount to the Azure User-assigned Managed Identity created in
    # Terraform (azurerm_user_assigned_identity.app). Combined with the
    # federated credential's trust relationship (also in Terraform) and the
    # label below, this is what lets pods using this ServiceAccount
    # exchange their Kubernetes token for a real Azure AD token — no
    # secret involved anywhere in this chain.
    azure.workload.identity/client-id: "${APP_IDENTITY_CLIENT_ID}"
  labels:
    # WHY this label: AKS's Workload Identity webhook only injects the
    # token-exchange machinery into pods that (a) use an annotated
    # ServiceAccount like this one, AND (b) carry this exact label
    # themselves (set on the POD template in deployment.yaml /
    # migration-job.yaml, not just here). Both are required.
    azure.workload.identity/use: "true"
